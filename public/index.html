<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academic Paraphraser — 5 Models</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, rgb(102,126,234) 0%, rgb(118,75,162) 100%);
  min-height: 100vh;
  padding: 20px;
}
.container { max-width: 1300px; margin: 0 auto; }
.header { text-align: center; color: white; margin-bottom: 30px; margin-top: 20px; }
.header h1 { font-size: 2.6rem; font-weight: 800; margin-bottom: 10px; }
.header p  { font-size: 1.1rem; opacity: 0.95; }

.controls {
  display: flex; gap: 10px; margin-bottom: 20px;
  flex-wrap: wrap; justify-content: center; align-items: center;
}
button {
  background: white; color: rgb(102,126,234);
  border: none; padding: 13px 26px; border-radius: 8px;
  cursor: pointer; font-weight: 700; font-size: 15px; transition: all 0.3s;
}
button:hover { background: rgb(245,245,245); transform: translateY(-2px); }
button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
select {
  padding: 13px 18px; border-radius: 8px; border: none;
  font-size: 15px; font-weight: 600; color: rgb(80,80,80);
  cursor: pointer; background: white;
}

.message { padding: 14px 20px; border-radius: 8px; margin-bottom: 18px; display: none; font-size: 15px; }
.message.show    { display: block; }
.message.success { background: rgb(212,237,218); color: rgb(21,87,36); }
.message.error   { background: rgb(248,215,218); color: rgb(114,28,36); }
.message.info    { background: rgb(209,236,241); color: rgb(12,84,96); }

.input-section {
  background: white; border-radius: 12px; padding: 24px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15); margin-bottom: 24px;
}
.input-section .panel-header {
  font-weight: 700; font-size: 16px; margin-bottom: 14px;
  color: rgb(60,60,60); border-bottom: 2px solid rgb(224,224,224); padding-bottom: 10px;
}
textarea {
  width: 100%; height: 200px; border: 2px solid rgb(221,221,221);
  border-radius: 8px; padding: 14px; font-family: 'Segoe UI', sans-serif;
  font-size: 14px; resize: vertical; transition: border-color 0.2s;
  line-height: 1.6;
}
textarea:focus { outline: none; border-color: rgb(102,126,234); }
.stats { margin-top: 12px; font-size: 13px; color: rgb(120,120,120); display: flex; gap: 20px; }

.loading-bar {
  height: 5px; background: rgba(255,255,255,0.3);
  border-radius: 3px; margin-bottom: 20px; overflow: hidden; display: none;
}
.loading-bar.active { display: block; }
.loading-bar-inner {
  height: 100%; width: 0%; background: white;
  border-radius: 3px; transition: width 0.4s ease;
}

.models-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(390px, 1fr));
  gap: 20px;
  margin-bottom: 28px;
}
.model-card {
  background: white; border-radius: 12px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.13);
  overflow: hidden; display: flex; flex-direction: column;
}
.model-card-header {
  padding: 14px 20px; font-weight: 700; font-size: 14px; color: white;
  display: flex; justify-content: space-between; align-items: center;
}
.model-card:nth-child(1) .model-card-header { background: linear-gradient(90deg,#667eea,#764ba2); }
.model-card:nth-child(2) .model-card-header { background: linear-gradient(90deg,#f093fb,#f5576c); }
.model-card:nth-child(3) .model-card-header { background: linear-gradient(90deg,#4facfe,#00f2fe); color: #333; }
.model-card:nth-child(4) .model-card-header { background: linear-gradient(90deg,#43e97b,#38f9d7); color: #333; }
.model-card:nth-child(5) .model-card-header { background: linear-gradient(90deg,#fa709a,#fee140); color: #333; }
.model-card-body { padding: 18px; flex: 1; }
.model-text {
  width: 100%; min-height: 150px; border: 2px solid rgb(230,230,230);
  border-radius: 8px; padding: 13px; font-family: 'Segoe UI', Georgia, serif;
  font-size: 13.5px; line-height: 1.75; resize: vertical; color: rgb(35,35,35);
  background: rgb(252,252,255);
}
.model-actions { padding: 0 18px 18px; display: flex; gap: 8px; }
.btn-sm {
  padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 2px solid; background: transparent; transition: all 0.2s;
}
.btn-copy { border-color: rgb(102,126,234); color: rgb(102,126,234); }
.btn-copy:hover { background: rgb(102,126,234); color: white; }
.btn-dl   { border-color: rgb(118,75,162); color: rgb(118,75,162); }
.btn-dl:hover { background: rgb(118,75,162); color: white; }
.style-badge {
  font-size: 11px; background: rgba(255,255,255,0.28);
  padding: 3px 9px; border-radius: 12px; font-weight: 600;
}
.footer { text-align: center; color: white; margin-top: 40px; opacity: 0.9; font-size: 14px; }

@media (max-width: 820px) {
  .models-grid { grid-template-columns: 1fr; }
  .header h1  { font-size: 1.9rem; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>&#128218; Academic Paraphraser</h1>
    <p>5 Academically Distinct Models &mdash; Citations, Numbers &amp; Quotes Preserved</p>
  </div>

  <div id="message" class="message"></div>

  <div class="input-section">
    <div class="panel-header">&#128221; Original Text</div>
    <textarea id="orig" placeholder="Paste your academic text here...&#10;&#10;All citations (Author, Year), numbers, and quoted text will be preserved exactly."></textarea>
    <div class="stats">
      <span>Words: <strong id="w1">0</strong></span>
      <span>Characters: <strong id="c1">0</strong></span>
    </div>
  </div>

  <div class="controls">
    <select id="levelSel">
      <option value="أقصى درجة">Maximum Level</option>
      <option value="عالية">High Level</option>
      <option value="متوسطة">Medium Level</option>
      <option value="منخفضة">Low Level</option>
    </select>
    <button id="btnParaphrase" onclick="paraphrase()">&#9889; Generate 5 Models</button>
    <button onclick="copyAll()" id="btnCopyAll" style="display:none">&#128203; Copy All</button>
    <button onclick="downloadAll()" id="btnDlAll" style="display:none">&#128190; Download All</button>
    <button onclick="clearAll()">&#128465; Clear</button>
  </div>

  <div class="loading-bar" id="loadBar">
    <div class="loading-bar-inner" id="loadBarInner"></div>
  </div>

  <div class="models-grid" id="modelsGrid"></div>

  <div class="footer">
    <p><strong>Academic Paraphraser</strong> &mdash; Professional AI Writing Assistant</p>
    <p>Contact: search.one011@gmail.com</p>
  </div>
</div>

<script>
const API = '/api';
const STYLE_LABELS = [
  'Passive Evidence',
  'Evidence-Led',
  'Theoretical / Analytical',
  'Literature Attribution',
  'Temporal & Critical'
];

document.getElementById('orig').addEventListener('input', function() {
  const text  = this.value;
  const words = text.trim().split(/\s+/).filter(w => w).length;
  document.getElementById('w1').textContent = words || 0;
  document.getElementById('c1').textContent = text.length;
});

function showmsg(text, type, duration) {
  type     = type     || 'info';
  duration = duration !== undefined ? duration : 5000;
  const msg = document.getElementById('message');
  msg.textContent = text;
  msg.className   = 'message show ' + type;
  if (duration > 0) setTimeout(() => msg.classList.remove('show'), duration);
}

function setLoadBar(pct) {
  document.getElementById('loadBarInner').style.width = pct + '%';
}

async function paraphrase() {
  const text  = document.getElementById('orig').value.trim();
  const level = document.getElementById('levelSel').value;
  if (!text) { showmsg('Please enter some text.', 'error'); return; }

  const btn = document.getElementById('btnParaphrase');
  btn.disabled    = true;
  btn.textContent = 'Processing...';

  document.getElementById('loadBar').classList.add('active');
  setLoadBar(5);
  buildGrid();

  try {
    const promises = [0,1,2,3,4].map(function(run_id) {
      return fetch(API + '/paraphrase', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text: text, level: level, run_id: run_id })
      }).then(function(r) { return r.json(); });
    });

    let done = 0;
    const results = await Promise.allSettled(promises);
    results.forEach(function(res, i) {
      done++;
      setLoadBar(10 + done * 18);
      if (res.status === 'fulfilled' && res.value && res.value.success) {
        fillModel(i, res.value.paraphrased_text);
      } else {
        const errMsg = (res.reason && res.reason.message)
          ? res.reason.message
          : (res.value && res.value.error ? res.value.error : 'Unknown error');
        fillModel(i, '[Error: ' + errMsg + ']');
      }
    });

    setLoadBar(100);
    showmsg('5 academic models generated successfully!', 'success');
    document.getElementById('btnCopyAll').style.display = 'inline-block';
    document.getElementById('btnDlAll').style.display   = 'inline-block';

  } catch (err) {
    showmsg('Error: ' + err.message, 'error', 8000);
  } finally {
    btn.disabled    = false;
    btn.textContent = 'Generate 5 Models';
    setTimeout(function() {
      document.getElementById('loadBar').classList.remove('active');
      setLoadBar(0);
    }, 900);
  }
}

function buildGrid() {
  const grid = document.getElementById('modelsGrid');
  grid.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    (function(idx) {
      const div = document.createElement('div');
      div.className = 'model-card';
      div.id = 'card' + idx;
      div.innerHTML =
        '<div class="model-card-header">' +
          '<span id="hdr' + idx + '">Model ' + (idx+1) + '</span>' +
          '<span class="style-badge">' + STYLE_LABELS[idx] + '</span>' +
        '</div>' +
        '<div class="model-card-body">' +
          '<textarea class="model-text" id="model' + idx + '" readonly' +
            ' placeholder="Generating model ' + (idx+1) + '..."></textarea>' +
        '</div>' +
        '<div class="model-actions">' +
          '<button class="btn-sm btn-copy" onclick="copyModel(' + idx + ')">Copy</button>' +
          '<button class="btn-sm btn-dl"   onclick="dlModel('   + idx + ')">Download</button>' +
        '</div>';
      grid.appendChild(div);
    })(i);
  }
}

function fillModel(i, text) {
  const ta = document.getElementById('model' + i);
  if (!ta) return;
  ta.value = text;
  const words = text.trim().split(/\s+/).filter(function(w){ return w; }).length;
  const hdr   = document.getElementById('hdr' + i);
  if (hdr) hdr.textContent = 'Model ' + (i+1) + '  \u2022  ' + words + ' words';
}

function copyModel(i) {
  const text = document.getElementById('model' + i).value;
  if (!text || text.startsWith('[Error')) { showmsg('Model not ready.', 'error', 2000); return; }
  navigator.clipboard.writeText(text)
    .then(function()  { showmsg('Model ' + (i+1) + ' copied!', 'success', 2000); })
    .catch(function() { showmsg('Copy failed.', 'error'); });
}

function dlModel(i) {
  const text = document.getElementById('model' + i).value;
  if (!text || text.startsWith('[Error')) return;
  _dl('academic_model_' + (i+1) + '.txt', text);
}

function copyAll() {
  var all = '';
  for (var i = 0; i < 5; i++) {
    var t = document.getElementById('model' + i).value;
    if (t && !t.startsWith('[Error'))
      all += '=== Model ' + (i+1) + ' — ' + STYLE_LABELS[i] + ' ===\n' + t + '\n\n';
  }
  if (!all) { showmsg('No models ready.', 'error', 2000); return; }
  navigator.clipboard.writeText(all.trim())
    .then(function()  { showmsg('All models copied!', 'success', 2500); })
    .catch(function() { showmsg('Copy failed.', 'error'); });
}

function downloadAll() {
  var all = '';
  for (var i = 0; i < 5; i++) {
    var t = document.getElementById('model' + i).value;
    if (t && !t.startsWith('[Error'))
      all += '=== Model ' + (i+1) + ' — ' + STYLE_LABELS[i] + ' ===\n' + t + '\n\n';
  }
  if (!all) return;
  _dl('academic_5_models.txt', all.trim());
}

function _dl(filename, text) {
  var a = document.createElement('a');
  a.href     = 'data:text/plain;charset=utf-8,' + encodeURIComponent(text);
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  showmsg('Downloaded!', 'success', 2000);
}

function clearAll() {
  document.getElementById('orig').value          = '';
  document.getElementById('w1').textContent      = '0';
  document.getElementById('c1').textContent      = '0';
  document.getElementById('modelsGrid').innerHTML = '';
  document.getElementById('btnCopyAll').style.display = 'none';
  document.getElementById('btnDlAll').style.display   = 'none';
  document.getElementById('message').classList.remove('show');
}

window.addEventListener('load', function() {
  fetch(API + '/health')
    .then(function(r) { if (r.ok) showmsg('System ready!', 'success', 2500); })
    .catch(function(e) { console.warn('Health check failed', e); });
});
</script>
</body>
</html>
